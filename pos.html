<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바자회 관리자 포스</title>
    <style>
        :root {
            --primary: #333;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --accent: #e74c3c; 
            --blue: #3498db;
        }
        body { font-family: 'Pretendard', -apple-system, sans-serif; display: flex; height: 100vh; margin: 0; background: var(--bg); color: var(--primary); }
        
        /* 1. 상품 영역 (Grid) */
        .product-grid { 
            flex: 2; 
            padding: 25px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            grid-auto-rows: 140px; 
            gap: 15px; 
            overflow-y: auto; 
        }
        .p-btn { 
            background: var(--card-bg); 
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 16px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
        }
        .p-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.08); background: #fff; }
        .p-btn:active { transform: scale(0.95); background: #f1f1f1; }
        .p-btn h3 { margin: 0; font-size: 1.05rem; font-weight: 600; color: #2d3436; }
        .p-btn p { margin: 5px 0 0; font-size: 0.9rem; color: #636e72; }

        /* 2. 사이드바 (주문 내역) */
        .sidebar { flex: 0.8; background: var(--card-bg); border-left: 1px solid #eee; display: flex; flex-direction: column; padding: 25px; min-width: 340px; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        h2 { margin: 0; font-size: 1.4rem; }
        
        /* 주문 전체 초기화 */
        .clear-all-btn { 
            background: none; 
            border: 1px solid #ddd; 
            color: #999; 
            padding: 5px 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.8rem;
        }
        .clear-all-btn:hover { background: #fff1f0; color: var(--accent); border-color: #ffa39e; }

        .cart-list { flex: 1; overflow-y: auto; margin: 10px 0; }
        .cart-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px solid #f8f9fa; 
        }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 1rem; margin-bottom: 2px; }
        .item-price { font-size: 0.85rem; color: #999; }
        
        /* 수량 하나 빼기 (-) 버튼 */
        .remove-btn { 
            background: #f8f9fa; 
            color: var(--primary); 
            border: 1px solid #ddd; 
            width: 32px;
            height: 32px;
            border-radius: 8px; 
            font-size: 1.2rem; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            transition: 0.2s;
        }
        .remove-btn:hover { background: #eee; border-color: #bbb; }
        .remove-btn:active { background: #ddd; }

        .total-section { 
            padding-top: 20px; 
            border-top: 2px solid #333; 
            font-size: 1.8rem; 
            font-weight: 800; 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 20px; 
            color: #2c3e50;
        }
        
        input#cust-name { 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            margin-bottom: 12px;
            background: #fafafa;
            outline-color: var(--blue);
        }
        .save-btn { background: #1e272e; color: white; border: none; padding: 22px; border-radius: 16px; font-size: 1.3rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .save-btn:hover { background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="product-grid" id="product-grid"></div>

<div class="sidebar">
    <div class="sidebar-header">
        <h2>현재 주문</h2>
        <button class="clear-all-btn" onclick="clearCart()">전체 비우기</button>
    </div>
    
    <input type="text" id="cust-name" placeholder="입금자/후원자 성함">
    
    <div class="cart-list" id="cart-list"></div>

    <div class="total-section">
        <span>합계</span>
        <span id="total-amount">0원</span>
    </div>
    
    <button class="save-btn" onclick="saveToSheet()">데이터 저장 및 완료</button>
</div>
<script>
    // 1. 상품 데이터
    const products = [
        { name: "러기지택+스티커", price: 15000, stock: 67 },
        { name: "마그넷", price: 5000, stock: 100 },
        { name: "파우치", price: 8000, stock: 100 },
        { name: "티코스터", price: 8000, stock: 100 },
        { name: "접는 부채", price: 20000, stock: 10 },
        { name: "일반 부채", price: 7000, stock: 20 },
        { name: "키링", price: 3000, stock: 20 }
    ];

    let cart = {};

    // [중요] 화면 업데이트 함수를 위쪽으로 올렸습니다.
    function renderCart() {
        const list = document.getElementById('cart-list');
        const totalDisp = document.getElementById('total-amount');
        if (!list || !totalDisp) return;

        list.innerHTML = '';
        let total = 0;

        for (let name in cart) {
            const item = cart[name];
            total += item.price * item.qty;
            list.innerHTML += `
                <div class="cart-item">
                    <div class="item-info">
                        <div class="item-name">${name} x ${item.qty}</div>
                        <div class="item-price">${(item.price * item.qty).toLocaleString()}원</div>
                    </div>
                    <button class="remove-btn" onclick="removeFromCart('${name}')">−</button>
                </div>`;
        }
        totalDisp.innerText = total.toLocaleString() + "원";
    }

    function updateButtonStatus(btn, product) {
        if (!btn) return;
        if (product.stock <= 0) {
            btn.style.backgroundColor = '#e9ecef';
            btn.style.opacity = '0.6';
            btn.style.cursor = 'not-allowed';
        } else if (product.stock <= 10) {
            btn.style.backgroundColor = '#fff9db';
            btn.style.borderColor = '#fab005';
        } else {
            btn.style.backgroundColor = '#ffffff';
            btn.style.borderColor = 'rgba(0,0,0,0.05)';
        }
    }

    function addToCart(product, index) {
        if (product.stock > 0) {
            if (cart[product.name]) {
                cart[product.name].qty++;
            } else {
                cart[product.name] = { price: product.price, qty: 1, index: index };
            }
            product.stock--; 
            updateButtonStatus(document.getElementById(`prod-${index}`), product);
            renderCart(); // 이제 renderCart를 정상적으로 호출할 수 있습니다.
        }
    }

    function removeFromCart(name) {
        if (cart[name]) {
            const prodIndex = cart[name].index;
            products[prodIndex].stock++;
            updateButtonStatus(document.getElementById(`prod-${prodIndex}`), products[prodIndex]);
            
            cart[name].qty--;
            if (cart[name].qty <= 0) delete cart[name];
        }
        renderCart();
    }

    async function saveToSheet() {
        const nameInput = document.getElementById('cust-name');
        const name = nameInput ? nameInput.value || "익명" : "익명";
        const saveBtn = document.querySelector('.save-btn');

        if (Object.keys(cart).length === 0) return;

        saveBtn.disabled = true;
        saveBtn.innerText = "저장 중...";

        const summary = Object.keys(cart).map(k => `${k}(${cart[k].qty})`).join(', ');
        const totalAmount = Object.values(cart).reduce((s, i) => s + (i.price * i.qty), 0);

        try {
            await fetch('https://script.google.com/macros/s/AKfycbxBrYh4FvlTlvVO8V9VGH3v3_WLN8iQrHEMIfE2buj6880FW9dF0quC8gdR-P70ydfb/exec', {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    customerName: name,
                    orderSummary: summary,
                    totalAmount: totalAmount,
                    payMethod: "계좌이체"
                })
            });

            alert(`${name}님 저장 완료!`);
            cart = {};
            if (nameInput) nameInput.value = '';
            renderCart();
        } catch (error) {
            console.error("전송 에러:", error);
            alert("저장 실패! 네트워크를 확인하세요.");
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerText = "데이터 저장 및 완료";
        }
    }

    function init() {
        const grid = document.getElementById('product-grid');
        if (!grid) return;
        
        grid.innerHTML = '';
        products.forEach((p, index) => {
            const btn = document.createElement('div');
            btn.id = `prod-${index}`;
            btn.className = 'p-btn';
            btn.innerHTML = `<h3>${p.name}</h3><p>${p.price.toLocaleString()}원</p>`;
            updateButtonStatus(btn, p);
            btn.onclick = () => addToCart(p, index);
            grid.appendChild(btn);
        });

        const nameInput = document.getElementById('cust-name');
        if (nameInput) {
            nameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveToSheet();
            });
        }
    }

    // 모든 준비가 끝나면 실행
    window.onload = init;
</script>

</body>
</html>
