<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바자회 관리자 포스</title>
    <style>
        :root {
            --primary: #333;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --accent: #e74c3c; 
            --blue: #3498db;
        }
        body { font-family: 'Pretendard', -apple-system, sans-serif; display: flex; height: 100vh; margin: 0; background: var(--bg); color: var(--primary); }
        
        /* 1. 상품 영역 (Grid) */
        .product-grid { 
            flex: 2; 
            padding: 25px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            grid-auto-rows: 140px; 
            gap: 15px; 
            overflow-y: auto; 
        }
        .p-btn { 
            background: var(--card-bg); 
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 16px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
        }
        .p-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.08); background: #fff; }
        .p-btn:active { transform: scale(0.95); background: #f1f1f1; }
        .p-btn h3 { margin: 0; font-size: 1.05rem; font-weight: 600; color: #2d3436; }
        .p-btn p { margin: 5px 0 0; font-size: 0.9rem; color: #636e72; }

        /* 2. 사이드바 (주문 내역) */
        .sidebar { flex: 0.8; background: var(--card-bg); border-left: 1px solid #eee; display: flex; flex-direction: column; padding: 25px; min-width: 340px; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        h2 { margin: 0; font-size: 1.4rem; }
        
        /* 주문 전체 초기화 */
        .clear-all-btn { 
            background: none; 
            border: 1px solid #ddd; 
            color: #999; 
            padding: 5px 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.8rem;
        }
        .clear-all-btn:hover { background: #fff1f0; color: var(--accent); border-color: #ffa39e; }

        .cart-list { flex: 1; overflow-y: auto; margin: 10px 0; }
        .cart-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px solid #f8f9fa; 
        }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 1rem; margin-bottom: 2px; }
        .item-price { font-size: 0.85rem; color: #999; }
        
        /* 수량 하나 빼기 (-) 버튼 */
        .remove-btn { 
            background: #f8f9fa; 
            color: var(--primary); 
            border: 1px solid #ddd; 
            width: 32px;
            height: 32px;
            border-radius: 8px; 
            font-size: 1.2rem; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            transition: 0.2s;
        }
        .remove-btn:hover { background: #eee; border-color: #bbb; }
        .remove-btn:active { background: #ddd; }

        .total-section { 
            padding-top: 20px; 
            border-top: 2px solid #333; 
            font-size: 1.8rem; 
            font-weight: 800; 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 20px; 
            color: #2c3e50;
        }
        
        input#cust-name { 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            margin-bottom: 12px;
            background: #fafafa;
            outline-color: var(--blue);
        }
        .save-btn { background: #1e272e; color: white; border: none; padding: 22px; border-radius: 16px; font-size: 1.3rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .save-btn:hover { background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        /* 로딩 스피너 애니메이션 */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 버튼 비활성화 시 커서 모양 변경 */
        .save-btn:disabled {
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="product-grid" id="product-grid"></div>

<div class="sidebar">
    <div class="sidebar-header">
        <h2>현재 주문</h2>
        <button class="clear-all-btn" onclick="clearAllCart()">전체 비우기</button>
    </div>
    
    <input type="text" id="cust-name" placeholder="입금자/후원자 성함">
    
    <div class="cart-list" id="cart-list"></div>

    <div class="total-section">
        <span>합계</span>
        <span id="total-amount">0원</span>
    </div>
    
    <button class="save-btn" onclick="saveToSheet()">데이터 저장 및 완료</button>
</div>
<script>
    // 1. 상품 데이터
    const products = [
        { name: "러기지택", price: 12000, stock: 1000 },
        { name: "마그넷", price: 5000, stock: 1000 },
        { name: "파우치", price: 8000, stock: 1000 },
        { name: "티코스터", price: 8000, stock: 1000 },
        { name: "접는 부채", price: 20000, stock: 1000 },
        { name: "일반 부채", price: 7000, stock: 1000 },
        { name: "키링", price: 5000, stock: 1000 },
        { name: "잔돈(천원)", price: 1000, stock: 1000 },
        { name: "잔돈(오천원)", price: 5000, stock: 1000 },
        { name: "잔돈(만원)", price: 10000, stock: 1000 }    
    ];

   let cart = {};
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby-uk6alEVqscLDE8D9anfnjkSYLDGkmydU3TaP4V8cdVNT7LEIfb9SbHcJ7gEIKh_P/exec'
        ;

    // 장바구니 화면 업데이트
    function renderCart() {
        const list = document.getElementById('cart-list');
        const totalDisp = document.getElementById('total-amount');
        if (!list) return;

        list.innerHTML = '';
        let total = 0;

        for (let name in cart) {
            const item = cart[name];
            total += item.price * item.qty;
            list.innerHTML += `
                <div class="cart-item">
                    <div class="item-info">
                        <div class="item-name">${name} x ${item.qty}</div>
                        <div class="item-price">${(item.price * item.qty).toLocaleString()}원</div>
                    </div>
                    <button class="remove-btn" onclick="removeFromCart('${name}')">−</button>
                </div>`;
        }
        totalDisp.innerText = total.toLocaleString() + "원";
    }

    // 버튼 색상 업데이트 (재고 시각화)
    function updateButtonStatus(btn, product) {
        if (!btn) return;

        if (product.stock <= 0) {
            // [품절 상태]
            btn.style.backgroundColor = '#e9ecef';
            btn.style.color = '#adb5bd';        // 글자색 회색
            btn.style.borderColor = '#dee2e6';  // 테두리 회색
            btn.style.opacity = '0.6';
            btn.style.cursor = 'not-allowed';
        } else if (product.stock <= 10) {
            // [재고 부족 상태 - 노란색]
            btn.style.backgroundColor = '#fff9db';
            btn.style.color = '#333';           // 글자색 다시 검정으로
            btn.style.borderColor = '#fab005';  // 테두리 노란색
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
        } else {
            // [정상 상태 - 완전 원복]
            btn.style.backgroundColor = '#ffffff';
            btn.style.color = '#333';           // 글자색 검정
            btn.style.borderColor = 'rgba(0,0,0,0.1)'; // 테두리 연하게
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
        }
    }

    function addToCart(product, index) {
        if (product.stock > 0) {
            if (cart[product.name]) cart[product.name].qty++;
            else cart[product.name] = { price: product.price, qty: 1, index: index };
            
            product.stock--; 
            updateButtonStatus(document.getElementById(`prod-${index}`), product);
            renderCart();
        }
    }

    function removeFromCart(name) {
        if (cart[name]) {
            const idx = cart[name].index;
            products[idx].stock++;
            updateButtonStatus(document.getElementById(`prod-${idx}`), products[idx]);
            
            cart[name].qty--;
            if (cart[name].qty <= 0) delete cart[name];
        }
        renderCart();
    }
    
    function clearAllCart() {
        if (Object.keys(cart).length === 0) return; // 비어있으면 실행 안 함
        
        if (!confirm("장바구니를 모두 비우시겠습니까?")) return;
    
        // 1. 장바구니에 담긴 모든 품목의 재고를 원복
        for (let name in cart) {
            const item = cart[name];
            const idx = item.index;
        
            products[idx].stock += item.qty; // 줄었던 재고를 다시 더함
        
            // 2. 해당 버튼의 스타일을 실시간으로 업데이트
            const btn = document.getElementById(`prod-${idx}`);
            updateButtonStatus(btn, products[idx]);
        }

        // 3. 데이터 및 화면 초기화
        cart = {};
        renderCart();
    }

        // 최종 저장 함수 (행 분리 전송)
    async function saveToSheet() {
        const nameInput = document.getElementById('cust-name');
        const name = nameInput.value.trim() || "익명";
        const saveBtn = document.querySelector('.save-btn');

        if (Object.keys(cart).length === 0) return;

        // [주문번호 생성]
        const now = new Date();
        const orderId = String(now.getHours()).padStart(2, '0') + 
                        String(now.getMinutes()).padStart(2, '0') + "-" +
                        String(now.getSeconds()).padStart(2, '0');

        // 1. 버튼 비활성화 및 로딩 표시 (버퍼링 효과)
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span class="spinner"></span> 처리 중...'; 
        saveBtn.style.backgroundColor = '#adb5bd'; // 회색으로 변경

        try {
            // 2. 비동기 병렬 전송 시작 (Promise.all)
            const sendPromises = Object.keys(cart).map(itemName => {
                const item = cart[itemName];
                return fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        orderId: orderId,
                        customerName: name,
                        itemName: itemName,
                        quantity: item.qty,
                        price: item.price,
                        total: item.price * item.qty
                    })
                });
            });

            // 모든 품목이 전송될 때까지 기다림 (병렬이라 훨씬 빠름)
            await Promise.all(sendPromises);

            // 3. 성공 시 피드백
            alert(`[주문번호: ${orderId}] 저장 완료!`);
        
            // 초기화
            cart = {};
            nameInput.value = '';
            renderCart();

        } catch (e) {
            console.error("전송 에러:", e);
            alert("일부 데이터 저장에 실패했습니다. 인터넷을 확인하세요.");
        } finally {
            // 4. 버튼 원복
            saveBtn.disabled = false;
            saveBtn.innerHTML = "데이터 저장 및 완료";
            saveBtn.style.backgroundColor = ''; // 원래 색상으로(CSS 기준)
        }
    }

    function init() {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        products.forEach((p, i) => {
            const btn = document.createElement('div');
            btn.id = `prod-${i}`;
            btn.className = 'p-btn';
            btn.innerHTML = `<h3>${p.name}</h3><p>${p.price.toLocaleString()}원</p>`;
            updateButtonStatus(btn, p);
            btn.onclick = () => addToCart(p, i);
            grid.appendChild(btn);
        });

        document.getElementById('cust-name').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveToSheet();
        });
    }

    window.onload = init;
    // 스크립트 하단에 추가
    window.onbeforeunload = function() {
        return "페이지를 새로고침하면 현재 화면의 재고 수치가 초기화됩니다. 계속하시겠습니까?";
    };
</script>

</body>
</html>
